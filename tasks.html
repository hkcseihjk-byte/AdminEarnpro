<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tasks — Admin</title>
  <link rel="stylesheet" href="css/admin.css"/>
</head>
<body>
<div id="page-loader"><div class="ring"></div></div>

<div class="main" id="main-content" style="display:none;">
  <header class="top-bar">
    <div style="display:flex;align-items:center;gap:12px;">
      <button class="menu-toggle">☰</button>
      <span class="page-title">🎯 Tasks Management</span>
    </div>
    <div class="top-bar-right">
      <button class="btn btn-primary btn-sm" onclick="openCreateModal()">+ New Task</button>
    </div>
  </header>

  <div class="content">
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Title</th>
              <th>Type</th>
              <th>Reward</th>
              <th>Completed By</th>
              <th>Status</th>
              <th>Created</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="tasks-table"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Create/Edit Task Modal -->
<div class="modal-bg" id="task-modal">
  <div class="modal-box">
    <div class="modal-title" id="task-modal-title">Create Task</div>
    <input type="hidden" id="task-id"/>
    <div class="form-group">
      <label>Task Title</label>
      <input type="text" id="t-title" class="input" placeholder="e.g. Visit our website"/>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="t-desc" class="input" placeholder="Short description…"></textarea>
    </div>
    <div class="form-group">
      <label>Task Type</label>
      <select id="t-type" class="input">
        <option value="visit">Visit Website</option>
        <option value="youtube">Watch YouTube</option>
        <option value="instagram">Follow Instagram</option>
        <option value="twitter">Follow Twitter</option>
        <option value="app">Download App</option>
        <option value="survey">Complete Survey</option>
        <option value="signup">Sign Up</option>
      </select>
    </div>
    <div class="form-group">
      <label>Task URL</label>
      <input type="url" id="t-url" class="input" placeholder="https://example.com"/>
    </div>
    <div class="form-group">
      <label>Reward Amount ($)</label>
      <input type="number" id="t-reward" class="input" placeholder="0.10" min="0" step="0.01"/>
    </div>
    <div class="form-group">
      <label>Status</label>
      <select id="t-active" class="input">
        <option value="true">Active (visible to users)</option>
        <option value="false">Inactive (hidden)</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="save-task-btn" onclick="saveTask()">Save Task</button>
    </div>
  </div>
</div>

<!-- Delete Confirm -->
<div class="modal-bg" id="del-modal">
  <div class="modal-box">
    <div class="modal-title">🗑️ Delete Task</div>
    <p style="font-size:14px;color:var(--text2);margin-bottom:20px;">Are you sure you want to delete "<span id="del-task-name"></span>"? This cannot be undone.</p>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="document.getElementById('del-modal').classList.remove('open')">Cancel</button>
      <button class="btn btn-danger" id="del-confirm-btn" onclick="deleteTask()">Delete</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase/firebase.js"></script>
<script src="js/sidebar.js"></script>
<script>
let deleteTargetId=null;

requireAdmin(()=>{
  renderAdminSidebar('tasks');
  document.getElementById('page-loader').classList.add('hide');
  document.getElementById('main-content').style.display='flex';
  document.getElementById('main-content').style.flexDirection='column';
  loadTasks();
});

async function loadTasks(){
  const tbody=document.getElementById('tasks-table');
  tbody.innerHTML='<tr><td colspan="7" style="text-align:center;padding:20px;color:var(--text3);">Loading…</td></tr>';

  const snap=await db.collection('tasks').orderBy('createdAt','desc').get();
  if(snap.empty){ tbody.innerHTML='<tr><td colspan="7" style="text-align:center;padding:20px;color:var(--text3);">No tasks yet. Create one!</td></tr>'; return; }

  const completionCounts={};
  const cSnap=await db.collection('completedTasks').get();
  cSnap.forEach(d=>{ const tid=d.data().taskId; completionCounts[tid]=(completionCounts[tid]||0)+1; });

  const icons={'visit':'🌐','youtube':'▶️','instagram':'📸','twitter':'🐦','app':'📱','survey':'📝','signup':'✍️'};

  tbody.innerHTML=snap.docs.map(d=>{
    const t={id:d.id,...d.data()};
    return `<tr>
      <td>
        <div style="font-size:13px;font-weight:600;">${t.title||'—'}</div>
        <div style="font-size:11px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;max-width:200px;white-space:nowrap;">${t.description||''}</div>
      </td>
      <td><span class="badge badge-purple">${icons[t.type]||'🎯'} ${t.type||'—'}</span></td>
      <td class="text-gold font-bold">$${formatCurrency(t.reward)}</td>
      <td style="color:var(--text2);">${completionCounts[t.id]||0} users</td>
      <td><span class="badge ${t.isActive?'badge-success':'badge-danger'}">${t.isActive?'Active':'Inactive'}</span></td>
      <td style="color:var(--text3);font-size:12px;">${timeAgo(t.createdAt)}</td>
      <td>
        <div style="display:flex;gap:4px;">
          <button class="btn btn-secondary btn-xs" onclick='openEdit(${JSON.stringify(t)})'>Edit</button>
          <button class="btn btn-danger btn-xs" onclick="openDelete('${t.id}','${(t.title||'').replace(/'/g,"\\\'")}')">Delete</button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

function openCreateModal(){
  document.getElementById('task-id').value='';
  document.getElementById('task-modal-title').textContent='Create Task';
  document.getElementById('t-title').value='';
  document.getElementById('t-desc').value='';
  document.getElementById('t-type').value='visit';
  document.getElementById('t-url').value='';
  document.getElementById('t-reward').value='';
  document.getElementById('t-active').value='true';
  document.getElementById('task-modal').classList.add('open');
}

function openEdit(t){
  document.getElementById('task-id').value=t.id||'';
  document.getElementById('task-modal-title').textContent='Edit Task';
  document.getElementById('t-title').value=t.title||'';
  document.getElementById('t-desc').value=t.description||'';
  document.getElementById('t-type').value=t.type||'visit';
  document.getElementById('t-url').value=t.url||'';
  document.getElementById('t-reward').value=parseFloat(t.reward||0).toFixed(2);
  document.getElementById('t-active').value=t.isActive?'true':'false';
  document.getElementById('task-modal').classList.add('open');
}

async function saveTask(){
  const btn=document.getElementById('save-task-btn');
  const id=document.getElementById('task-id').value;
  const data={
    title:document.getElementById('t-title').value.trim(),
    description:document.getElementById('t-desc').value.trim(),
    type:document.getElementById('t-type').value,
    url:document.getElementById('t-url').value.trim(),
    reward:parseFloat(document.getElementById('t-reward').value)||0,
    isActive:document.getElementById('t-active').value==='true'
  };
  if(!data.title){ showToast('Title is required','warning'); return; }
  if(!data.url)  { showToast('URL is required','warning'); return; }
  btn.textContent='Saving…'; btn.disabled=true;
  try {
    if(id){
      await db.collection('tasks').doc(id).update(data);
      showToast('Task updated!','success');
    } else {
      await db.collection('tasks').add({...data, createdAt:firebase.firestore.FieldValue.serverTimestamp()});
      showToast('Task created!','success');
    }
    closeModal(); loadTasks();
  } catch(e){ showToast('Error: '+e.message,'error'); }
  btn.textContent='Save Task'; btn.disabled=false;
}

function openDelete(id, title){
  deleteTargetId=id;
  document.getElementById('del-task-name').textContent=title;
  document.getElementById('del-modal').classList.add('open');
}

async function deleteTask(){
  if(!deleteTargetId) return;
  const btn=document.getElementById('del-confirm-btn');
  btn.textContent='Deleting…'; btn.disabled=true;
  try {
    await db.collection('tasks').doc(deleteTargetId).delete();
    document.getElementById('del-modal').classList.remove('open');
    showToast('Task deleted','success');
    loadTasks();
  } catch(e){ showToast('Error: '+e.message,'error'); btn.disabled=false; btn.textContent='Delete'; }
}

function closeModal(){ document.getElementById('task-modal').classList.remove('open'); }
document.querySelectorAll('.modal-bg').forEach(m=>m.addEventListener('click',e=>{ if(e.target===m) m.classList.remove('open'); }));
</script>
</body>
</html>
