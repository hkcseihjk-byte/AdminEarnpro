<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login</title>
  <link rel="stylesheet" href="css/admin.css"/>
  <style>
    body { display:block; background:var(--bg); }
    .login-wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
    .login-box { width:100%; max-width:400px; background:var(--bg3); border:1px solid var(--border); border-radius:20px; padding:36px 28px; animation:fadeIn 0.4s ease; }
    .login-logo { text-align:center; margin-bottom:28px; }
    .login-logo .icon { width:64px; height:64px; border-radius:18px; background:linear-gradient(135deg,var(--purple),#4f46e5); display:inline-flex; align-items:center; justify-content:center; font-size:28px; margin-bottom:12px; }
    .login-logo h1 { font-size:1.3rem; font-weight:800; }
    .login-logo p  { font-size:13px; color:var(--text2); margin-top:4px; }
    .denied-box { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); border-radius:10px; padding:12px; margin-bottom:16px; font-size:13px; color:#ef4444; text-align:center; }
    .error-box  { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); border-radius:10px; padding:12px; margin-bottom:16px; font-size:13px; color:#ef4444; text-align:center; }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-box">
    <div class="login-logo">
      <div class="icon">🛡️</div>
      <h1>Admin Access</h1>
      <p>Private admin portal — authorised access only</p>
    </div>

    <div class="denied-box hidden" id="denied-box">⛔ Access Denied — Admin only area</div>
    <div class="error-box hidden" id="error-box"></div>

    <form id="admin-login-form">
      <div class="form-group">
        <label>Admin Email</label>
        <input type="email" id="email" class="input" placeholder="admin@example.com" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" class="input" placeholder="Admin password" required/>
      </div>
      <button type="submit" id="login-btn" class="btn btn-primary w-full mt-8" style="font-size:15px;padding:12px;">
        Login to Admin Panel
      </button>
    </form>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase/firebase.js"></script>
<script>
  if(new URLSearchParams(window.location.search).get('denied')){
    document.getElementById('denied-box').classList.remove('hidden');
  }

  // If already logged in as admin, go to dashboard
  auth.onAuthStateChanged(async user => {
    if(user){
      try {
        const doc = await db.collection('users').doc(user.uid).get();
        if(doc.exists && doc.data().role==='admin'){
          window.location.href='dashboard.html'; return;
        }
      } catch(e){}
      auth.signOut();
    }
  });

  document.getElementById('admin-login-form').addEventListener('submit', async e=>{
    e.preventDefault();
    const btn=document.getElementById('login-btn');
    const errBox=document.getElementById('error-box');
    errBox.classList.add('hidden');
    btn.textContent='Authenticating…'; btn.disabled=true;

    try {
      const cred=await auth.signInWithEmailAndPassword(
        document.getElementById('email').value.trim(),
        document.getElementById('password').value
      );
      // Verify admin role
      const doc=await db.collection('users').doc(cred.user.uid).get();
      if(!doc.exists || doc.data().role!=='admin'){
        await auth.signOut();
        errBox.textContent='⛔ Access Denied — You do not have admin privileges.';
        errBox.classList.remove('hidden');
        btn.textContent='Login to Admin Panel'; btn.disabled=false;
        return;
      }
      window.location.href='dashboard.html';
    } catch(err){
      btn.textContent='Login to Admin Panel'; btn.disabled=false;
      const msgs={
        'auth/user-not-found':'No account found.',
        'auth/wrong-password':'Incorrect password.',
        'auth/too-many-requests':'Too many attempts. Wait a moment.'
      };
      errBox.textContent=msgs[err.code]||err.message;
      errBox.classList.remove('hidden');
    }
  });
</script>
</body>
</html>
