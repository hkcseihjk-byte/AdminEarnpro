<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Users — Admin</title>
  <link rel="stylesheet" href="css/admin.css"/>
</head>
<body>
<div id="page-loader"><div class="ring"></div></div>

<div class="main" id="main-content" style="display:none;">
  <header class="top-bar">
    <div style="display:flex;align-items:center;gap:12px;">
      <button class="menu-toggle">☰</button>
      <span class="page-title">👥 Users Management</span>
    </div>
    <div class="top-bar-right">
      <span class="badge badge-info" id="user-count">0 users</span>
    </div>
  </header>

  <div class="content">
    <div class="filter-bar">
      <input type="text" id="search-input" class="input" placeholder="🔍 Search by name or email…"/>
      <select id="filter-status" class="input">
        <option value="">All Users</option>
        <option value="active">Active</option>
        <option value="banned">Banned</option>
      </select>
      <button class="btn btn-primary btn-sm" onclick="loadUsers()">Search</button>
    </div>

    <div class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>User</th>
              <th>Email</th>
              <th>Balance</th>
              <th>Earned</th>
              <th>Refs</th>
              <th>Status</th>
              <th>Joined</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="users-table"></tbody>
        </table>
      </div>
      <div class="pagination">
        <span class="info" id="page-info"></span>
        <div class="pagination-btns">
          <button class="btn btn-secondary btn-sm" id="prev-btn" disabled onclick="prevPage()">← Prev</button>
          <button class="btn btn-secondary btn-sm" id="next-btn" disabled onclick="nextPage()">Next →</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Edit User Modal -->
<div class="modal-bg" id="edit-modal">
  <div class="modal-box">
    <div class="modal-title">✏️ Edit User</div>
    <input type="hidden" id="edit-uid"/>
    <div class="form-group">
      <label>Display Name</label>
      <input type="text" id="edit-name" class="input"/>
    </div>
    <div class="form-group">
      <label>Balance ($)</label>
      <input type="number" id="edit-balance" class="input" step="0.01"/>
    </div>
    <div class="form-group">
      <label>Total Earned ($) <span style="color:var(--text3);font-size:11px;">(for rank calculation)</span></label>
      <input type="number" id="edit-earned" class="input" step="0.01"/>
    </div>
    <div class="form-group">
      <label>Note / Reason</label>
      <input type="text" id="edit-note" class="input" placeholder="Admin note"/>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('edit-modal')">Cancel</button>
      <button class="btn btn-primary" id="save-edit-btn" onclick="saveUserEdit()">Save Changes</button>
    </div>
  </div>
</div>

<!-- Ban Confirm Modal -->
<div class="modal-bg" id="ban-modal">
  <div class="modal-box">
    <div class="modal-title" id="ban-title">Ban User</div>
    <p style="font-size:14px;color:var(--text2);margin-bottom:20px;" id="ban-desc"></p>
    <div class="form-group">
      <label>Reason</label>
      <input type="text" id="ban-reason" class="input" placeholder="Reason for ban/unban"/>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('ban-modal')">Cancel</button>
      <button class="btn btn-danger" id="ban-confirm-btn" onclick="confirmBan()">Confirm</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase/firebase.js"></script>
<script src="js/sidebar.js"></script>
<script>
let lastDoc=null, firstDoc=null, pageSize=20, currentPage=1, totalCount=0;
let banTargetUid=null, banTargetBanned=false;

requireAdmin(()=>{
  renderAdminSidebar('users');
  document.getElementById('page-loader').classList.add('hide');
  document.getElementById('main-content').style.display='flex';
  document.getElementById('main-content').style.flexDirection='column';
  loadUsers();
});

async function loadUsers(direction='start'){
  const tbody=document.getElementById('users-table');
  tbody.innerHTML='<tr><td colspan="8" style="text-align:center;padding:20px;color:var(--text3);">Loading…</td></tr>';

  const search=document.getElementById('search-input').value.trim().toLowerCase();
  const filter=document.getElementById('filter-status').value;

  let query=db.collection('users');
  if(filter==='banned') query=query.where('isBanned','==',true);
  else if(filter==='active') query=query.where('isBanned','==',false);
  query=query.orderBy('createdAt','desc');

  if(direction==='next'&&lastDoc) query=query.startAfter(lastDoc);
  if(direction==='prev'&&firstDoc) query=query.endBefore(firstDoc).limitToLast(pageSize);
  else query=query.limit(pageSize);

  const snap=await query.get();
  document.getElementById('user-count').textContent=snap.size+' users';

  let docs=snap.docs;
  if(search) docs=docs.filter(d=>{
    const u=d.data();
    return (u.displayName||'').toLowerCase().includes(search)||(u.email||'').toLowerCase().includes(search);
  });

  if(docs.length===0){ tbody.innerHTML='<tr><td colspan="8" style="text-align:center;padding:20px;color:var(--text3);">No users found</td></tr>'; return; }

  firstDoc=docs[0]; lastDoc=docs[docs.length-1];
  document.getElementById('next-btn').disabled=snap.size<pageSize;
  document.getElementById('prev-btn').disabled=currentPage<=1;
  document.getElementById('page-info').textContent=`Page ${currentPage}`;

  tbody.innerHTML=docs.map(d=>{
    const u={id:d.id,...d.data()};
    return `
      <tr>
        <td>
          <div style="display:flex;align-items:center;gap:8px;">
            <div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--purple),#4f46e5);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;">
              ${(u.displayName||'U').substring(0,2).toUpperCase()}
            </div>
            <div>
              <div style="font-size:13px;font-weight:600;">${u.displayName||'—'}</div>
              <div style="font-size:11px;color:var(--text3);">${u.referralCode||''}</div>
            </div>
          </div>
        </td>
        <td style="color:var(--text2);font-size:12px;">${u.email||'—'}</td>
        <td class="text-gold font-bold">$${formatCurrency(u.balance)}</td>
        <td class="text-green">$${formatCurrency(u.totalEarned)}</td>
        <td style="color:var(--text2);">${u.referralCount||0}</td>
        <td><span class="badge ${u.isBanned?'badge-danger':'badge-success'}">${u.isBanned?'Banned':'Active'}</span></td>
        <td style="color:var(--text3);font-size:12px;">${timeAgo(u.createdAt)}</td>
        <td>
          <div style="display:flex;gap:4px;flex-wrap:wrap;">
            <button class="btn btn-secondary btn-xs" onclick='openEdit(${JSON.stringify({id:u.id,displayName:u.displayName,balance:u.balance,totalEarned:u.totalEarned})})'>Edit</button>
            <button class="btn btn-xs ${u.isBanned?'btn-success':'btn-danger'}" onclick="openBan('${u.id}',${u.isBanned},'${(u.displayName||'User').replace(/'/g,"\\'")}')">
              ${u.isBanned?'Unban':'Ban'}
            </button>
          </div>
        </td>
      </tr>`;
  }).join('');
}

function prevPage(){ if(currentPage>1){ currentPage--; loadUsers('prev'); } }
function nextPage(){ currentPage++; loadUsers('next'); }

function openEdit(u){
  document.getElementById('edit-uid').value    = u.id;
  document.getElementById('edit-name').value   = u.displayName||'';
  document.getElementById('edit-balance').value= parseFloat(u.balance||0).toFixed(2);
  document.getElementById('edit-earned').value = parseFloat(u.totalEarned||0).toFixed(2);
  document.getElementById('edit-note').value   = '';
  document.getElementById('edit-modal').classList.add('open');
}

async function saveUserEdit(){
  const btn=document.getElementById('save-edit-btn');
  btn.textContent='Saving…'; btn.disabled=true;
  const uid    =document.getElementById('edit-uid').value;
  const name   =document.getElementById('edit-name').value.trim();
  const balance=parseFloat(document.getElementById('edit-balance').value)||0;
  const earned =parseFloat(document.getElementById('edit-earned').value)||0;
  try {
    await db.collection('users').doc(uid).update({ displayName:name, balance, totalEarned:earned });
    closeModal('edit-modal');
    showToast('User updated!','success');
    loadUsers();
  } catch(e){ showToast('Failed: '+e.message,'error'); }
  btn.textContent='Save Changes'; btn.disabled=false;
}

function openBan(uid, isBanned, name){
  banTargetUid=uid; banTargetBanned=isBanned;
  document.getElementById('ban-title').textContent=(isBanned?'Unban':'Ban')+' User';
  document.getElementById('ban-desc').textContent=`Are you sure you want to ${isBanned?'unban':'ban'} "${name}"?`;
  document.getElementById('ban-confirm-btn').textContent=isBanned?'Unban User':'Ban User';
  document.getElementById('ban-confirm-btn').className='btn '+(isBanned?'btn-success':'btn-danger');
  document.getElementById('ban-modal').classList.add('open');
}

async function confirmBan(){
  if(!banTargetUid) return;
  const btn=document.getElementById('ban-confirm-btn');
  btn.textContent='Processing…'; btn.disabled=true;
  try {
    await db.collection('users').doc(banTargetUid).update({ isBanned:!banTargetBanned });
    closeModal('ban-modal');
    showToast(`User ${banTargetBanned?'unbanned':'banned'} successfully`,'success');
    loadUsers();
  } catch(e){ showToast('Failed: '+e.message,'error'); }
  btn.disabled=false;
}

function closeModal(id){ document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-bg').forEach(m=>m.addEventListener('click',e=>{ if(e.target===m) m.classList.remove('open'); }));
</script>
</body>
</html>
