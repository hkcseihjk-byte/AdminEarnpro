<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Settings — Admin</title>
  <link rel="stylesheet" href="css/admin.css"/>
</head>
<body>
<div id="page-loader"><div class="ring"></div></div>

<div class="main" id="main-content" style="display:none;">
  <header class="top-bar">
    <div style="display:flex;align-items:center;gap:12px;">
      <button class="menu-toggle">☰</button>
      <span class="page-title">⚙️ Platform Settings</span>
    </div>
    <div class="top-bar-right">
      <button class="btn btn-primary btn-sm" id="save-all-btn" onclick="saveSettings()">💾 Save All Settings</button>
    </div>
  </header>

  <div class="content">

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">

      <!-- Earnings Settings -->
      <div class="card">
        <div class="card-header"><h2>💰 Earnings</h2></div>

        <div class="form-group">
          <label>Ad Reward per Ad ($)</label>
          <input type="number" id="adReward" class="input" placeholder="0.05" min="0" step="0.001"/>
          <div style="font-size:11px;color:var(--text3);margin-top:4px;">Amount earned per ad watch</div>
        </div>
        <div class="form-group">
          <label>Ad Duration (seconds)</label>
          <input type="number" id="adDuration" class="input" placeholder="30" min="5"/>
          <div style="font-size:11px;color:var(--text3);margin-top:4px;">How long the ad plays</div>
        </div>
        <div class="form-group">
          <label>Daily Ad Limit (per user)</label>
          <input type="number" id="adDailyLimit" class="input" placeholder="10" min="1"/>
        </div>
        <div class="form-group">
          <label>Daily Bonus Amount ($)</label>
          <input type="number" id="dailyBonus" class="input" placeholder="0.10" min="0" step="0.001"/>
          <div style="font-size:11px;color:var(--text3);margin-top:4px;">Base daily login bonus</div>
        </div>
      </div>

      <!-- Referral & Withdraw -->
      <div class="card">
        <div class="card-header"><h2>👥 Referral & Withdraw</h2></div>

        <div class="form-group">
          <label>Referral Bonus ($)</label>
          <input type="number" id="referralBonus" class="input" placeholder="0.50" min="0" step="0.01"/>
          <div style="font-size:11px;color:var(--text3);margin-top:4px;">Paid to referrer per new user</div>
        </div>
        <div class="form-group">
          <label>Minimum Withdraw ($)</label>
          <input type="number" id="minWithdraw" class="input" placeholder="5.00" min="0" step="0.01"/>
        </div>
        <div class="form-group">
          <label>Maximum Withdraw per Request ($)</label>
          <input type="number" id="maxWithdraw" class="input" placeholder="100.00" min="0" step="0.01"/>
        </div>
        <div class="form-group">
          <label>Withdraw Processing Time</label>
          <input type="text" id="withdrawTime" class="input" placeholder="1-3 business days"/>
        </div>
      </div>

      <!-- Platform Info -->
      <div class="card">
        <div class="card-header"><h2>🌐 Platform Info</h2></div>
        <div class="form-group">
          <label>Platform Name</label>
          <input type="text" id="platformName" class="input" placeholder="EarnZone"/>
        </div>
        <div class="form-group">
          <label>Support Email</label>
          <input type="email" id="supportEmail" class="input" placeholder="support@earnzone.com"/>
        </div>
        <div class="form-group">
          <label>Currency Symbol</label>
          <input type="text" id="currencySymbol" class="input" placeholder="$" maxlength="3"/>
        </div>
        <div class="form-group">
          <label>Platform Status</label>
          <select id="platformStatus" class="input">
            <option value="active">🟢 Active — Open to all users</option>
            <option value="maintenance">🔴 Maintenance — Temporarily closed</option>
          </select>
        </div>
      </div>

      <!-- Rank Thresholds -->
      <div class="card">
        <div class="card-header"><h2>🏆 Rank Thresholds (Total Earned $)</h2></div>
        <div class="form-group">
          <label>🥉 Bronze → Silver (min $)</label>
          <input type="number" id="rankSilver" class="input" placeholder="500" min="0"/>
        </div>
        <div class="form-group">
          <label>🥈 Silver → Gold (min $)</label>
          <input type="number" id="rankGold" class="input" placeholder="2000" min="0"/>
        </div>
        <div class="form-group">
          <label>🥇 Gold → Platinum (min $)</label>
          <input type="number" id="rankPlatinum" class="input" placeholder="5000" min="0"/>
        </div>
        <div class="form-group">
          <label>🏆 Platinum → Diamond (min $)</label>
          <input type="number" id="rankDiamond" class="input" placeholder="10000" min="0"/>
        </div>
      </div>

    </div>

    <!-- Payment Methods Toggle -->
    <div class="card">
      <div class="card-header"><h2>💳 Payment Methods</h2></div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;">
        <label style="display:flex;align-items:center;gap:10px;cursor:pointer;background:var(--bg4);padding:14px;border-radius:10px;border:1px solid var(--border);">
          <input type="checkbox" id="pm-bkash" style="width:16px;height:16px;accent-color:var(--purple);"/>
          <span>📱 bKash</span>
        </label>
        <label style="display:flex;align-items:center;gap:10px;cursor:pointer;background:var(--bg4);padding:14px;border-radius:10px;border:1px solid var(--border);">
          <input type="checkbox" id="pm-nagad" style="width:16px;height:16px;accent-color:var(--purple);"/>
          <span>🟠 Nagad</span>
        </label>
        <label style="display:flex;align-items:center;gap:10px;cursor:pointer;background:var(--bg4);padding:14px;border-radius:10px;border:1px solid var(--border);">
          <input type="checkbox" id="pm-paypal" style="width:16px;height:16px;accent-color:var(--purple);"/>
          <span>💳 PayPal</span>
        </label>
        <label style="display:flex;align-items:center;gap:10px;cursor:pointer;background:var(--bg4);padding:14px;border-radius:10px;border:1px solid var(--border);">
          <input type="checkbox" id="pm-crypto" style="width:16px;height:16px;accent-color:var(--purple);"/>
          <span>₿ Crypto</span>
        </label>
      </div>
    </div>

    <div style="text-align:right;margin-top:8px;">
      <button class="btn btn-primary" id="save-all-btn2" onclick="saveSettings()" style="font-size:15px;padding:12px 28px;">💾 Save All Settings</button>
    </div>

  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase/firebase.js"></script>
<script src="js/sidebar.js"></script>
<script>
requireAdmin(async ()=>{
  renderAdminSidebar('settings');
  document.getElementById('page-loader').classList.add('hide');
  document.getElementById('main-content').style.display='flex';
  document.getElementById('main-content').style.flexDirection='column';
  await loadSettings();
});

async function loadSettings(){
  const doc=await db.collection('platform').doc('settings').get();
  if(!doc.exists) return;
  const s=doc.data();

  const setVal=(id,val)=>{ const el=document.getElementById(id); if(el) el.value=val??''; };
  const setChk=(id,val)=>{ const el=document.getElementById(id); if(el) el.checked=!!val; };

  setVal('adReward',    s.adReward);
  setVal('adDuration',  s.adDuration||30);
  setVal('adDailyLimit',s.adDailyLimit||10);
  setVal('dailyBonus',  s.dailyBonus);
  setVal('referralBonus',s.referralBonus);
  setVal('minWithdraw', s.minWithdraw||1);
  setVal('maxWithdraw', s.maxWithdraw||100);
  setVal('withdrawTime',s.withdrawTime||'1-3 business days');
  setVal('platformName',s.platformName||'EarnZone');
  setVal('supportEmail',s.supportEmail||'');
  setVal('currencySymbol',s.currencySymbol||'$');
  setVal('platformStatus',s.platformStatus||'active');
  setVal('rankSilver',  s.rankSilver||500);
  setVal('rankGold',    s.rankGold||2000);
  setVal('rankPlatinum',s.rankPlatinum||5000);
  setVal('rankDiamond', s.rankDiamond||10000);

  const pm=s.paymentMethods||{bkash:true,nagad:true,paypal:true,crypto:false};
  setChk('pm-bkash', pm.bkash); setChk('pm-nagad',pm.nagad);
  setChk('pm-paypal',pm.paypal); setChk('pm-crypto',pm.crypto);
}

async function saveSettings(){
  const btns=[document.getElementById('save-all-btn'),document.getElementById('save-all-btn2')];
  btns.forEach(b=>{if(b){b.textContent='Saving…';b.disabled=true;}});

  const getVal=(id)=>document.getElementById(id)?.value||'';
  const getNum=(id)=>parseFloat(document.getElementById(id)?.value)||0;
  const getChk=(id)=>document.getElementById(id)?.checked||false;

  const data={
    adReward:     getNum('adReward'),
    adDuration:   getNum('adDuration')||30,
    adDailyLimit: getNum('adDailyLimit')||10,
    dailyBonus:   getNum('dailyBonus'),
    referralBonus:getNum('referralBonus'),
    minWithdraw:  getNum('minWithdraw')||1,
    maxWithdraw:  getNum('maxWithdraw')||100,
    withdrawTime: getVal('withdrawTime'),
    platformName: getVal('platformName'),
    supportEmail: getVal('supportEmail'),
    currencySymbol:getVal('currencySymbol')||'$',
    platformStatus:getVal('platformStatus'),
    rankSilver:   getNum('rankSilver')||500,
    rankGold:     getNum('rankGold')||2000,
    rankPlatinum: getNum('rankPlatinum')||5000,
    rankDiamond:  getNum('rankDiamond')||10000,
    paymentMethods:{
      bkash: getChk('pm-bkash'), nagad: getChk('pm-nagad'),
      paypal:getChk('pm-paypal'),crypto:getChk('pm-crypto')
    },
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  };

  try {
    await db.collection('platform').doc('settings').set(data, {merge:true});
    showToast('✅ Settings saved successfully!','success');
  } catch(e){ showToast('Error: '+e.message,'error'); }

  btns.forEach(b=>{if(b){b.textContent='💾 Save All Settings';b.disabled=false;}});
}
</script>
</body>
</html>
