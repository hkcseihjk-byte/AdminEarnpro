<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Withdrawals — Admin</title>
  <link rel="stylesheet" href="css/admin.css"/>
</head>
<body>
<div id="page-loader"><div class="ring"></div></div>

<div class="main" id="main-content" style="display:none;">
  <header class="top-bar">
    <div style="display:flex;align-items:center;gap:12px;">
      <button class="menu-toggle">☰</button>
      <span class="page-title">💸 Withdrawals</span>
    </div>
    <div class="top-bar-right">
      <span class="badge badge-pending" id="pending-count">0 pending</span>
    </div>
  </header>

  <div class="content">

    <!-- Summary Cards -->
    <div class="stats-row" style="grid-template-columns:repeat(3,1fr);">
      <div class="stat-box">
        <div class="sb-header"><span style="font-size:13px;color:var(--text2);">Pending</span><div class="sb-icon" style="background:rgba(245,158,11,0.15);">⏳</div></div>
        <div class="sb-value text-gold" id="sum-pending">0</div>
        <div class="sb-label">Awaiting review</div>
      </div>
      <div class="stat-box">
        <div class="sb-header"><span style="font-size:13px;color:var(--text2);">Approved</span><div class="sb-icon" style="background:rgba(16,185,129,0.15);">✅</div></div>
        <div class="sb-value text-green" id="sum-approved">$0</div>
        <div class="sb-label">Total paid out</div>
      </div>
      <div class="stat-box">
        <div class="sb-header"><span style="font-size:13px;color:var(--text2);">Rejected</span><div class="sb-icon" style="background:rgba(239,68,68,0.15);">❌</div></div>
        <div class="sb-value text-red" id="sum-rejected">0</div>
        <div class="sb-label">Total rejected</div>
      </div>
    </div>

    <div class="filter-bar">
      <select id="filter-status" class="input" onchange="loadWithdrawals()">
        <option value="pending">Pending</option>
        <option value="approved">Approved</option>
        <option value="rejected">Rejected</option>
        <option value="">All</option>
      </select>
      <select id="filter-method" class="input" onchange="loadWithdrawals()">
        <option value="">All Methods</option>
        <option value="bkash">bKash</option>
        <option value="nagad">Nagad</option>
        <option value="paypal">PayPal</option>
        <option value="crypto">Crypto</option>
      </select>
    </div>

    <div class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>User</th>
              <th>Amount</th>
              <th>Method</th>
              <th>Account</th>
              <th>Status</th>
              <th>Requested</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="wd-table"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Action Modal -->
<div class="modal-bg" id="action-modal">
  <div class="modal-box">
    <div class="modal-title" id="action-title">Process Withdrawal</div>
    <div id="action-info" style="background:var(--bg4);border-radius:10px;padding:14px;margin-bottom:16px;font-size:13px;"></div>
    <div class="form-group">
      <label>Admin Note (optional)</label>
      <textarea id="action-note" class="input" placeholder="Note to attach…"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-success" id="approve-btn" onclick="processWd('approved')">✅ Approve</button>
      <button class="btn btn-danger"  id="reject-btn"  onclick="processWd('rejected')">❌ Reject</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase/firebase.js"></script>
<script src="js/sidebar.js"></script>
<script>
let currentWdId=null, currentWdData=null;

requireAdmin(()=>{
  renderAdminSidebar('withdraw');
  document.getElementById('page-loader').classList.add('hide');
  document.getElementById('main-content').style.display='flex';
  document.getElementById('main-content').style.flexDirection='column';
  loadWithdrawals();
  loadSummary();
});

async function loadSummary(){
  const [pendSnap, approvedSnap, rejectedSnap]=await Promise.all([
    db.collection('withdrawals').where('status','==','pending').get(),
    db.collection('withdrawals').where('status','==','approved').get(),
    db.collection('withdrawals').where('status','==','rejected').get()
  ]);
  document.getElementById('sum-pending').textContent=pendSnap.size;
  document.getElementById('pending-count').textContent=pendSnap.size+' pending';
  let totalApproved=0;
  approvedSnap.forEach(d=>{totalApproved+=d.data().amount||0;});
  document.getElementById('sum-approved').textContent='$'+totalApproved.toFixed(2);
  document.getElementById('sum-rejected').textContent=rejectedSnap.size;
}

async function loadWithdrawals(){
  const tbody=document.getElementById('wd-table');
  tbody.innerHTML='<tr><td colspan="7" style="text-align:center;padding:20px;color:var(--text3);">Loading…</td></tr>';

  const status=document.getElementById('filter-status').value;
  const method=document.getElementById('filter-method').value;

  let query=db.collection('withdrawals').orderBy('createdAt','desc').limit(50);
  if(status) query=db.collection('withdrawals').where('status','==',status).orderBy('createdAt','desc').limit(50);

  const snap=await query.get();
  let docs=snap.docs;
  if(method) docs=docs.filter(d=>d.data().method===method);

  if(docs.length===0){ tbody.innerHTML='<tr><td colspan="7" style="text-align:center;padding:20px;color:var(--text3);">No records found</td></tr>'; return; }

  const colors={pending:'badge-pending',approved:'badge-success',rejected:'badge-danger'};
  tbody.innerHTML=docs.map(d=>{
    const w={id:d.id,...d.data()};
    const isPending=w.status==='pending';
    return `<tr>
      <td>
        <div style="font-size:13px;font-weight:600;">${w.displayName||'—'}</div>
        <div style="font-size:11px;color:var(--text3);">${w.email||''}</div>
      </td>
      <td class="text-gold font-bold" style="font-size:15px;">$${formatCurrency(w.amount)}</td>
      <td><span class="badge badge-info">${w.method||'—'}</span></td>
      <td style="font-size:12px;font-family:monospace;color:var(--text2);">${w.account||'—'}</td>
      <td><span class="badge ${colors[w.status]||'badge-pending'}">${w.status||'pending'}</span></td>
      <td style="color:var(--text3);font-size:12px;">${timeAgo(w.createdAt)}</td>
      <td>
        ${isPending?`<button class="btn btn-primary btn-xs" onclick='openAction("${w.id}",${JSON.stringify({amount:w.amount,method:w.method,account:w.account,displayName:w.displayName,email:w.email,uid:w.uid})})'>Review</button>`
        :`<span style="font-size:12px;color:var(--text3);">${w.adminNote||'—'}</span>`}
      </td>
    </tr>`;
  }).join('');
}

function openAction(id, data){
  currentWdId=id; currentWdData=data;
  document.getElementById('action-title').textContent='Process Withdrawal';
  document.getElementById('action-info').innerHTML=`
    <div class="flex-between mb-8"><span>User:</span><strong>${data.displayName||'—'}</strong></div>
    <div class="flex-between mb-8"><span>Email:</span><span style="color:var(--text2);">${data.email||'—'}</span></div>
    <div class="flex-between mb-8"><span>Amount:</span><strong class="text-gold">$${formatCurrency(data.amount)}</strong></div>
    <div class="flex-between mb-8"><span>Method:</span><span>${data.method||'—'}</span></div>
    <div class="flex-between"><span>Account:</span><span style="font-family:monospace;">${data.account||'—'}</span></div>`;
  document.getElementById('action-note').value='';
  document.getElementById('action-modal').classList.add('open');
}

async function processWd(action){
  if(!currentWdId) return;
  const btn=action==='approved'?document.getElementById('approve-btn'):document.getElementById('reject-btn');
  btn.textContent='Processing…'; btn.disabled=true;

  try {
    const note=document.getElementById('action-note').value.trim();
    const batch=db.batch();
    batch.update(db.collection('withdrawals').doc(currentWdId),{
      status:action, adminNote:note, processedAt:firebase.firestore.FieldValue.serverTimestamp()
    });

    // If rejected, refund balance
    if(action==='rejected'&&currentWdData){
      batch.update(db.collection('users').doc(currentWdData.uid),{
        balance:firebase.firestore.FieldValue.increment(currentWdData.amount||0),
        totalWithdrawn:firebase.firestore.FieldValue.increment(-(currentWdData.amount||0))
      });
      batch.set(db.collection('transactions').doc(),{
        uid:currentWdData.uid, type:'refund', amount:currentWdData.amount||0,
        description:'Withdrawal rejected — refunded',
        createdAt:firebase.firestore.FieldValue.serverTimestamp()
      });
    }

    if(action==='approved'){
      db.collection('platform').doc('stats').set({totalPaid:firebase.firestore.FieldValue.increment(currentWdData.amount||0)},{merge:true});
    }

    await batch.commit();
    closeModal();
    showToast(`Withdrawal ${action}`,'success');
    loadWithdrawals(); loadSummary();
  } catch(e){ showToast('Error: '+e.message,'error'); btn.disabled=false; btn.textContent=action==='approved'?'✅ Approve':'❌ Reject'; }
}

function closeModal(){ document.getElementById('action-modal').classList.remove('open'); }
document.getElementById('action-modal').addEventListener('click',e=>{ if(e.target===document.getElementById('action-modal')) closeModal(); });
</script>
</body>
</html>
